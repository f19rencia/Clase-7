<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Un fetch</title>
        <style>
          *{
            margin: 0;
            padding:0;
          }
            body {
                font-family: Helvetica, Arial, sans-serif;
                background-image: url(https://c7.alamy.com/comp/2XB04KB/stars-on-white-background-seamless-pattern-texture-2XB04KB.jpg);
            }
            #escondido{
                display:none;
            }

            div.contenedor{
             width:100%;
             max-width:600px;
             margin:5% auto;
             background:#fad4eb;
             padding: 3%;
             border-radius: 8px;     
            }

            ul, ol {
              list-style-position: inside;
            }
        </style>
        </head>

    <body>
        <svg viewBox="0 0 16 16" id="escondido">
            <symbol id="bien" viewBox="0 0 16 16">
                <path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"/>
            </symbol>

            <symbol id="mal" viewBox="0 0 16 16">
               <path d="M2.866 14.85c-.078.444.36.791.746.593l4.39-2.256 4.389 2.256c.386.198.824-.149.746-.592l-.83-4.73 3.522-3.356c.33-.314.16-.888-.282-.95l-4.898-.696L8.465.792a.513.513 0 0 0-.927 0L5.354 5.12l-4.898.696c-.441.062-.612.636-.283.95l3.523 3.356-.83 4.73zm4.905-2.767-3.686 1.894.694-3.957a.56.56 0 0 0-.163-.505L1.71 6.745l4.052-.576a.53.53 0 0 0 .393-.288L8 2.223l1.847 3.658a.53.53 0 0 0 .393.288l4.052.575-2.906 2.77a.56.56 0 0 0-.163.506l.694 3.957-3.686-1.894a.5.5 0 0 0-.461 0z"/>
            </symbol>
        </svg>

        <div class="contenedor">
          <h1>Hola mundo</h1>
          <ul id="estudiantes"></ul>
        </div>

        <script>
            fetch("https://raw.githubusercontent.com/profesorfaco/opr/refs/heads/main/clase-07/registros.json")
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos;
                    console.log("Datos recibidos:", trabajo);
                    const donde = document.getElementById("estudiantes");
                    //repita
                    trabajo.forEach((x) => {
                        var cuantos = [];
                        if (x.uno != "") {
                            cuantos.push(x.uno);
                        }
                        if (x.dos != "") {
                            cuantos.push(x.dos);
                        }
                        if (x.tres != "") {
                            cuantos.push(x.tres);
                        }
                        if (x.cuatro != "") {
                            cuantos.push(x.cuatro);
                        }
                        donde.innerHTML += `<li><a href="${x.cuenta}">${x.nombre}</a> ${estrellitas(cuantos)}</li>`;
                    });
                    function estrellitas(n) {
                        var armado = "";
                        n.forEach((e) => {
                            if(e[1]){
                                armado += `<a href="${e[0]}" target="_blank"><svg width="16" height="16" viewBox="0 0 16 16"><use href="#bien" fill="#00"/></svg></a>`;
                            } else {
                                armado += `<a href="${e[0]}" target="_blank"><svg width="16" height="16" viewBox="0 0 16 16"><use href="#mal" fill="#00"/></svg></a>`;
                            }
                        });
                        return armado;
                    }
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });
        </script>
    </body>
</html>
